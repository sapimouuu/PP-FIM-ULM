    <style>
        :root {
            --primary-color: #1d3c6a;
            --secondary-color: #6a8caf;
            --accent-color: #4a6984;
            --light-bg: #f8fafd;
            --card-bg: #6f86a5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: #333;
        }
        .navbar {
            background-color: #537895 !important;
        }
        .navbar-nav .nav-link {
            color: white !important;
            font-weight: 500;
        }
        .navbar-nav .nav-link.active {
            font-weight: 700;
            border-bottom: 2px solid white;
        }
        .page-title {
            color: var(--primary-color);
            font-weight: 800;
            font-size: 3rem;
            margin-top: 2rem;
            margin-bottom: 3rem;
            line-height: 1.2;
        }
        .role-title {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .bph-card {
            border: none;
            border-radius: 20px;
            background-color: var(--card-bg);
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
            overflow: hidden;
            max-width: 280px;
            margin: 0 auto;
        }
        .bph-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .bph-card img {
            border-radius: 20px 20px 0 0;
            background-color: #e2e8f0;
            width: 100%;
            height: 340px;
            object-fit: cover;
            object-position: top;
        }
        .bph-name {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        footer {
            background: linear-gradient(to bottom, transparent, #e2ebd5);
            padding: 2rem 0;
        }
        .social-icons a {
            font-size: 1.5rem;
            margin: 0 10px;
            transition: color 0.3s;
        }
    </style>
</head>
