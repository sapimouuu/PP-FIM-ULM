<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Kontak - UKM PP FIM ULM</title>

    <style>
        :root {
            --primary-color: #1d3c6a;
            --secondary-color: #6a8caf;
            --accent-color: #4a6984;
            --light-bg: #f8fafd;
            --box-bg: #6f86a5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: #333;
        }
        .navbar {
            background-color: #537895 !important;
        }
        .navbar-nav .nav-link {
            color: white !important;
            font-weight: 500;
        }
        .navbar-nav .nav-link.active {
            font-weight: 700;
            border-bottom: 2px solid white;
        }
        .page-title {
            color: var(--primary-color);
            font-weight: 800;
            font-size: 3rem;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .contact-box {
            background-color: var(--box-bg);
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .contact-subtitle {
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
        }
        .btn-contact-wa {
            background-color: #a1b8d2;
            color: var(--primary-color) !important;
            font-weight: 700;
            font-size: 1.05rem;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            display: block;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-contact-wa:hover {
            background-color: white;
            transform: translateY(-2px);
        }
        .form-label-custom {
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }
        .form-control-custom {
            background-color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            color: #333;
            font-size: 0.95rem;
        }
        .form-control-custom:focus {
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25);
            outline: none;
        }
        .btn-submit-custom {
            background-color: #1d3c6a;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            padding: 10px 0;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn-submit-custom:hover {
            background-color: #112542;
            color: white;
        }
        footer {
            background: linear-gradient(to bottom, transparent, #e2ebd5);
            padding: 2rem 0;
        }
        .social-icons a {
            font-size: 1.5rem;
            margin: 0 10px;
            transition: color 0.3s;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#section-departemen">Departemen</a></li>
                    <li class="nav-item"><a class="nav-link" href="sewa.html">Sewa Barang</a></li>
                    <li class="nav-item"><a class="nav-link active" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container px-4 mb-5">
        <div class="text-start mx-auto" style="max-width: 600px;">
            <h1 class="page-title">Hubungi<br>Kami</h1>
        </div>

        <div class="contact-box">
            <div class="contact-subtitle">Narahubung</div>
            <div class="d-flex flex-column gap-3 mb-5">
                <a href="https://wa.me/6282350778174?text=Halo%20Ketua%20Umum" class="btn-contact-wa" target="_blank">
                    <i class="fab fa-whatsapp me-2"></i>Ketua Umum
                </a>
                <a href="https://wa.me/6285753307916?text=Halo%20Waketum%201" class="btn-contact-wa" target="_blank">
                    <i class="fab fa-whatsapp me-2"></i>Waketum 1
                </a>
                <a href="https://wa.me/6285846065710?text=Halo%20Waketum%202" class="btn-contact-wa" target="_blank">
                    <i class="fab fa-whatsapp me-2"></i>Waketum 2
                </a>
                <a href="https://wa.me/6283841866733?text=Halo%20Sekretaris%20Umum" class="btn-contact-wa" target="_blank">
                    <i class="fab fa-whatsapp me-2"></i>Sekretaris Umum
                </a>
                <a href="https://wa.me/6287735018842?text=Halo%20Bendahara%20Umum" class="btn-contact-wa" target="_blank">
                    <i class="fab fa-whatsapp me-2"></i>Bendahara Umum
                </a>
            </div>

            <div class="contact-subtitle pt-2" style="border-top: 1px solid rgba(255,255,255,0.2);">Form Informasi</div>
            
            <form id="formKontak" class="d-flex flex-column gap-3">
                <div>
                    <label class="form-label form-label-custom">Nama</label>
                    <input type="text" class="form-control form-control-custom w-100" placeholder="Masukkan nama Anda" required>
                </div>
                <div>
                    <label class="form-label form-label-custom">Email / No. HP</label>
                    <input type="text" class="form-control form-control-custom w-100" placeholder="Masukkan email atau nomor HP" required>
                </div>
                <div>
                    <label class="form-label form-label-custom">Pesan</label>
                    <textarea class="form-control form-control-custom w-100" rows="4" placeholder="Ketikkan pesan atau pertanyaan Anda di sini..." required></textarea>
                </div>
                <div class="mt-2">
                    <button type="submit" class="btn-submit-custom">Kirim</button>
                </div>
            </form>

        </div>
    </main>

    <footer class="text-center mt-5">
        <div class="container">
            <p class="mb-3 text-muted" style="font-size: 0.9rem; font-weight: 600;">Media Sosial UKM PP FIM ULM</p>
            <div class="social-icons mb-3">
                <a href="https://www.instagram.com/inovasi_ulm/" class="social-instagram" target="_blank"><i class="fab fa-instagram"></i></a> 
                <a href="https://www.tiktok.com/@inovasi_ulm" class="social-tiktok" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.youtube.com/@ukmppfimulm" class="social-youtube" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://www.facebook.com/100064884186241" class="social-facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
            </div>
            <small class="text-muted">&copy; 2026 Kominfo PP FIM ULM. All Rights Reserved.</small>
        </div>
    </footer>

    <script>
        document.getElementById('formKontak').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Terima kasih! Pesan permintaan informasi Anda telah berhasil terkirim.');
            this.reset();
        });
    </script>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
